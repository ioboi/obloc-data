name: Flat

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/flat.yml
      - ./postprocess.ts
  workflow_dispatch: {}
  schedule:
    - cron: '*/20 7-23 * * *'

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
      - name: Setup deno
        uses: denoland/setup-deno@main
        with:
          deno-version: v1.18.1
      - name: Check out repo
        uses: actions/checkout@v2
      - name: Fetch data
        uses: githubocto/flat@v3
        with:
          http_url: https://obloc.ch/_cmsbox_backends_/obloc/guestcounter/
          downloaded_filename: fetched.txt
          postprocess: postprocess.ts
